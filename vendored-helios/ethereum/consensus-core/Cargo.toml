[package]
name = "helios-consensus-core"
version = "1.0.0"
edition = "2021"

[dependencies]
# Don't inherit workspace version to not inherit all of the features defined in the workspace
alloy = { version = "1.0.3", default-features = false, features = [
    "consensus",
    "rpc-types",
    "ssz",
    "rlp",
    "k256",
    "eips",
] }
alloy-rlp = "0.3.12"
bls12_381 = { version = "0.8.0", features = ["experimental"] }
ssz_types = "0.11"
ethereum_ssz_derive = "0.9"

ethereum_ssz = "0.9"
tree_hash_derive = "0.10.0"
tree_hash = "0.10.0"
typenum = "1.17.0"

sha2 = "0.9"
eyre = "0.6.8"

serde = { version = "1.0.143", features = ["derive"] }
superstruct = "0.7.0"

thiserror = "1.0.37"
tracing = "0.1.37"

zduny-wasm-timer = "0.2.8"


[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
wasmtimer = "0.2.0"

     
[dev-dependencies]
tokio = { version = "1", features = ["full"] }
snap = "1"
serde_yaml = "0.9.34"
reqwest = { version = "0.11", features = ["json"] }
serde_json = "1.0"
