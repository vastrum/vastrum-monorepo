<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>vastrum keystore</title>
</head>
<body>
<script>
(function () {
  var STORAGE_KEY = 'account_private_key_shared';
  var selfHost = location.hostname;
  var selfProto = location.protocol;

  function isTrustedOrigin(origin) {
    try {
      var u = new URL(origin);
      if (u.protocol !== selfProto) return false;
      var h = u.hostname;
      if (h === selfHost) return true;
      if (h.endsWith('.' + selfHost)) return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  function reply(event, payload) {
    try {
      event.source.postMessage(payload, event.origin);
    } catch (e) {}
  }

  window.addEventListener('message', function (event) {
    if (!isTrustedOrigin(event.origin)) return;
    var data = event.data;
    if (!data || typeof data !== 'object') return;
    var requestId = data.request_id;
    if (typeof requestId !== 'number' && typeof requestId !== 'string') return;

    if (data.type === 'keystore:get') {
      try {
        var v = localStorage.getItem(STORAGE_KEY);
        reply(event, { type: 'keystore:result', request_id: requestId, value: v });
      } catch (e) {
        reply(event, { type: 'keystore:error', request_id: requestId, code: 'storage_unavailable' });
      }
      return;
    }

    if (data.type === 'keystore:set_if_empty') {
      if (typeof data.value !== 'string' || data.value.length === 0) {
        reply(event, { type: 'keystore:error', request_id: requestId, code: 'invalid_value' });
        return;
      }
      try {
        var existing = localStorage.getItem(STORAGE_KEY);
        if (existing !== null) {
          reply(event, { type: 'keystore:result', request_id: requestId, value: existing });
          return;
        }
        localStorage.setItem(STORAGE_KEY, data.value);
        reply(event, { type: 'keystore:result', request_id: requestId, value: data.value });
      } catch (e) {
        reply(event, { type: 'keystore:error', request_id: requestId, code: 'storage_unavailable' });
      }
      return;
    }
  });
})();
</script>
</body>
</html>
