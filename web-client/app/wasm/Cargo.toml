[package]
name = "vastrum-wasm"
version = "1.0.0"
edition = "2024"



[features]
default = ["eth-rpc-webrtc"]
#default = ["eth-rpc-http"]
eth-rpc-webrtc = []
eth-rpc-http = []

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
vastrum-shared-types.workspace = true
borsh = {version = "1.6.0", features = ["derive"]}
hex = "0.4"
console_error_panic_hook = "0.1.7"
reqwest = { version = "0.13", features = ["json"] }
tsify = "0.5.6"
futures = "0.3"                                                               
gloo-timers = { version = "0.3.0", features = ["futures"] }
getrandom = { version = "0.4", features = ["wasm_js"] }
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
thiserror = "2"
beerus = { git = "https://github.com/vastrum/Beeruser", default-features = false }
iamgroot = { git = "https://github.com/vastrum/Beeruser" }
async-trait = "0.1"
js-sys = "0.3"
webrtc-direct-client = { path = "../../../webrtc-direct/client" }

[dependencies.web-sys]
version = "0.3"
features = [
    "console",
    "Window",
    "Location",
    "Crypto",
    "Storage",
    "HtmlIFrameElement",
    "Document",
    "PopStateEvent",
    "Blob",
    "BlobPropertyBag",
    "Url",
    "Worker",
    "WorkerOptions",
    "WorkerType",
    "MessageEvent",
    "ErrorEvent",
    "CustomEvent",
    "CustomEventInit",
    "EventTarget",
    "XmlHttpRequest",
]

