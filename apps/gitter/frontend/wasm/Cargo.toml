[package]
name = "gitter-wasm"
version = "1.0.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
borsh = {version = "1.6.0", features = ["derive"]}
getrandom = { version = "0.4", features = ["wasm_js"] }
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
hex = "0.4"
base64 = "0.22"
tsify = "0.5.6"
vastrum-shared-types = { version = "0.1.0", path = "../../../../shared-types" }
vastrum-git-lib = { path = "../../vastrum-git-lib" }
vastrum-abi = { version = "0.1.0", path = "../../../../runtime/vastrum-abi" }
vastrum-rpc-client = { version = "0.1.0", path = "../../../../tooling/rpc-client" }
vastrum-runtime-shared = { version = "0.1.0", path = "../../../../runtime/runtime-shared" }
gix-hash =  { version="0.22.1", features=["serde"] }
vastrum-frontend-lib = { version = "0.1.0", path = "../../../../tooling/vastrum-lib-rust-frontend" }
gix-object =  { version="0.57.0", features=["serde"] }
futures = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
    "console",
    "Window",
    "Request",
    "RequestInit",
    "RequestMode",
    "Response",
    "Headers",
    "Crypto",
    "Storage",
    "HtmlIFrameElement",
    "MessageEvent",
    "Document",
    "CustomEvent",
    "CustomEventInit",
    "History",
    "PopStateEvent",
]
