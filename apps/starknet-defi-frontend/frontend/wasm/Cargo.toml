[package]
name = "starknet-defi-frontend-wasm"
version = "1.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ekubo_sdk = { path = "../../../../rust-sdk-main", default-features = false, features = ["no_std", "starknet"] }
ruint = { version = "1.14.0", default-features = false }
starknet-types-core = { version = "1", default-features = false }
